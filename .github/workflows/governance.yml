name: Governance

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pinned-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Verify pins, all sources, target lifecycle, typed C contracts, and C AST goldens
        run: npm run test:toolchain

  native-smoke:
    name: Native smoke (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - gcc
          - clang
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Run required strict native toolchain
        run: python3 scripts/ci/runtime_smoke.py --toolchain "${{ matrix.toolchain }}"

  license-and-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Validate license and provenance policy
        run: python3 scripts/ci/check_license_policy.py

      - name: Exercise release-artifact fail-closed checks
        run: python3 -m unittest discover -s test/governance -p 'test_*.py'

      - name: Validate required CI wiring
        run: python3 scripts/ci/check_ci_policy.py

      - name: Validate JSON specifications
        run: jq empty docs/specs/*.json
