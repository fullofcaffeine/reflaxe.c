name: Governance

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install checksum-verified Gitleaks
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/gitleaks-bin"
          bash scripts/ci/install-gitleaks.sh --install-dir "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Scan every reachable Git revision
        run: bash scripts/security/run-gitleaks.sh

  haxe-format:
    name: Haxe formatter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Install exact Haxe formatter
        run: npx --no-install haxelib install formatter 1.18.0 --quiet

      - name: Check repository-owned Haxe formatting
        run: npm run format:haxe:check

  toolchain-shards:
    name: Pinned toolchain (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard:
          - contracts
          - lowering-objects
          - lowering-semantics
          - caxecraft
          - snapshots
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Run exact isolated toolchain shard
        run: npm run test:toolchain:shard -- "${{ matrix.shard }}"

  pinned-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - toolchain-shards
    if: ${{ always() }}
    steps:
      - name: Require every isolated toolchain shard
        env:
          TOOLCHAIN_SHARDS_RESULT: ${{ needs['toolchain-shards'].result }}
        run: |
          set -euo pipefail
          if [ "$TOOLCHAIN_SHARDS_RESULT" != "success" ]; then
            echo "one or more pinned toolchain shards did not succeed: $TOOLCHAIN_SHARDS_RESULT" >&2
            exit 1
          fi
          echo "all pinned toolchain shards succeeded"

  native-smoke:
    name: Native smoke (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - gcc
          - clang
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Run required strict native toolchain
        run: python3 scripts/ci/runtime_smoke.py --toolchain "${{ matrix.toolchain }}"

      - name: Verify primitive algorithms at O0 and O2
        run: python3 test/primitive_semantics/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated primitive bodies at O0 and O2
        run: python3 test/body_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated static functions at O0 and O2
        run: python3 test/function_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated aggregate layouts at O0 and O2
        run: python3 test/aggregate_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated class layouts at O0 and O2
        run: python3 test/class_layout/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated constructors and cleanup at O0 and O2
        run: python3 test/constructor_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated virtual dispatch at O0 and O2
        run: python3 test/virtual_dispatch/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated enum layouts at O0 and O2
        run: python3 test/enum_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated closed generic instances at O0 and O2
        run: python3 test/generic_specialization/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated evaluation order at O0 and O2
        run: python3 test/evaluation_order/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated static initialization at O0 and O2
        run: python3 test/static_initialization/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify arithmetic boundaries, UBSan, and optimized fast paths
        run: python3 test/arithmetic_semantics/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify fixed-array and span lowering at O0 and O2
        run: python3 test/span_lowering/run.py --native-only --toolchain "${{ matrix.toolchain }}"

      - name: Verify generated Caxecraft domain at O0, O2, and under sanitizers
        run: python3 examples/caxecraft/run.py --native-only --toolchain "${{ matrix.toolchain }}"

  build-adapters:
    name: Build adapters (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - gcc
          - clang
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Install checksum-pinned Meson
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/build-adapter-tools"
          "$RUNNER_TEMP/build-adapter-tools/bin/pip" install \
            --disable-pip-version-check \
            --no-input \
            --only-binary=:all: \
            --require-hashes \
            -r scripts/ci/build-adapter-requirements.txt
          echo "$RUNNER_TEMP/build-adapter-tools/bin" >> "$GITHUB_PATH"

      - name: Require build-system tools
        run: |
          cmake --version
          meson --version
          ninja --version

      - name: Build raw, CMake, and Meson plans from one manifest
        run: npm run test:build-adapters -- --toolchain "${{ matrix.toolchain }}"

  raylib-headless:
    name: Raylib 6.0 headless (Linux GCC)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Require native build tools
        run: |
          gcc --version
          g++ --version
          clang --version
          cmake --version
          ninja --version

      - name: Build, link, and run generated Haxe against pinned Raylib
        shell: bash
        run: |
          set -euo pipefail
          raylib_cache="$RUNNER_TEMP/raylib-headless-cache"
          raylib_build="$RUNNER_TEMP/raylib-headless-build"
          raylib_report="$RUNNER_TEMP/raylib-headless-report.json"
          if [ -e "$raylib_cache" ]; then
            echo "Raylib clean-cache lane found a pre-existing cache" >&2
            exit 1
          fi
          python3 test/raylib_provisioning/run.py \
            --integration \
            --authority pinned-source \
            --configuration memory-software \
            --platform linux \
            --cache-root "$raylib_cache" \
            --build-root "$raylib_build" \
            --cc gcc \
            --cxx g++ \
            --clang clang \
            --cmake cmake \
            --generator Ninja \
            --allow-network \
            --run \
            --report "$raylib_report"

      - name: Preserve normalized Raylib headless evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raylib-headless-linux-gcc
          path: ${{ runner.temp }}/raylib-headless-report.json
          if-no-files-found: error
          retention-days: 14

  raylib-desktop:
    name: Raylib 6.0 desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            platform: linux
            cc: gcc
            cxx: g++
          - name: macos-apple-clang
            os: macos-latest
            platform: macos
            cc: clang
            cxx: clang++
          - name: windows-clang-cl
            os: windows-latest
            platform: windows
            cc: clang-cl
            cxx: clang-cl
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve exact Haxe and Lix tools
        run: npm ci

      - name: Install recorded Linux desktop SDK inputs
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Require native build tools
        shell: bash
        run: |
          "${{ matrix.cc }}" --version
          "${{ matrix.cxx }}" --version
          clang --version
          cmake --version
          ninja --version

      - name: Compile and link generated Haxe against pinned Raylib desktop
        shell: bash
        run: |
          set -euo pipefail
          raylib_cache="$RUNNER_TEMP/raylib-desktop-cache"
          raylib_build="$RUNNER_TEMP/raylib-desktop-build"
          raylib_report="$RUNNER_TEMP/raylib-desktop-report.json"
          if [ -e "$raylib_cache" ]; then
            echo "Raylib clean-cache lane found a pre-existing cache" >&2
            exit 1
          fi
          python3 test/raylib_provisioning/run.py \
            --integration \
            --authority pinned-source \
            --configuration desktop \
            --platform "${{ matrix.platform }}" \
            --cache-root "$raylib_cache" \
            --build-root "$raylib_build" \
            --cc "${{ matrix.cc }}" \
            --cxx "${{ matrix.cxx }}" \
            --clang clang \
            --cmake cmake \
            --generator Ninja \
            --allow-network \
            --report "$raylib_report"

      - name: Preserve normalized Raylib desktop evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raylib-desktop-${{ matrix.name }}
          path: ${{ runner.temp }}/raylib-desktop-report.json
          if-no-files-found: error
          retention-days: 14

  license-and-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate license and provenance policy
        run: python3 scripts/ci/check_license_policy.py

      - name: Validate contribution, disclosure, and release governance
        run: python3 scripts/ci/check_governance_policy.py

      - name: Validate bootstrap capability and limitation claims
        run: python3 scripts/ci/check_capability_manifest.py

      - name: Reject unreviewed untyped Haxe boundaries
        run: python3 scripts/ci/check_typed_boundaries.py

      - name: Validate and preview Beads bootstrap without bd
        run: |
          python3 scripts/beads/validate_plan.py --json
          python3 scripts/beads/bootstrap.py --json

      - name: Exercise release-artifact fail-closed checks
        run: python3 -m unittest discover -s test/governance -p 'test_*.py'

      - name: Validate required CI wiring
        run: python3 scripts/ci/check_ci_policy.py

      - name: Validate JSON specifications
        run: jq empty docs/specs/*.json
